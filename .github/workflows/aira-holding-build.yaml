name: Build & Deploy (Vite/Vue)

on:
  push:
    branches: [ "main", "dev" ] # 1. Listen to both branches

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      OUTPUT_DIR: dist
      CI: "true"
      TARGET_DIR: ${{ github.ref_name == 'main' && '/var/www/aira-holding' || '/var/www/aira-holding-dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List files
        run: |
          echo "Built files:"
          ls -la $OUTPUT_DIR

      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: aira-holding.de
          REMOTE_USER: deploy
          TARGET: ${{ env.TARGET_DIR }}
          SOURCE: ${{ env.OUTPUT_DIR }}/
          ARGS: "-rltgoDz --delete"